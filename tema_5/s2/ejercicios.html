    <!-- EJERCICIO 1
        Crea una lista vacía (ul) y un input con un botón.
        Al pulsar el botón:
        - Se debe añadir un nuevo elemento (li) a la lista con el texto del input
        - Cada elemento debe incluir un botón para eliminar ese propio elemento de la lista
    -->

    <!-- EJERCICIO 2
        Crea un botón que al pulsarlo muestre una alerta con el mensaje en el que se muestre un texto inicial que ponga "Lista de elementos:" y lo que haga sea mostrar el listado de la lista anterior.
        Además, debe tener un retraso de 3 segundos entre que le des al botón y se muestre.

        Ejemplo:
        <ul>
            <li>Patata</li>
            <li>Tomate</li>
        </ul>

        Alerta:
        Lista de elementos:
        - Patata
        - Tomate
    -->

    <!-- EJERCICIO 3
        Haz un input con un boton.
        Al pulsar el botón, se debe de abrir una nueva pestaña con la url que se haya introducido en el input.

        Luego explica que cambiarías para que no se abriese una nueva pestaña sino que fuese en la misma.
    -->

    <!-- EJERCICIO 4
        Crea inicialmente un elemento que contenga "Bienvenido.". 
        Luego, a través de javascript, añade un texto que ponga "¿Quiere ir a Google?", de forma que el único texto clicable sea la palabra "Google".
        Además, no puedes utilizar en este texto la propiedad innerHTML para modificar el html directamente.
    -->
