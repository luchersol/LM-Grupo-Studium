<body>
        
    <!-- #region EJERCICIOS HECHOS -->
    <!-- #endregion -->
    
    <!-- EJERCICIO 1:
        Crea un elemento con texto inicial de "Contador: 0" y un botón que, al pulsarlo, incremente el contador.
    -->

    <!-- EJERCICIO 2:
        Crea un input y un botón. 
        Cuando el usuario pulse el botón, muestra en un alert el texto que ha escrito en el input.
    -->

    <!-- EJERCICIO 3:
        Crea varios botones, cada uno con un atributo data-color distinto (rojo, azul, verde).
        Cuando el usuario pulse uno, muestra en un alert el color asociado a ese botón.
    -->
        
    <!-- EJERCICIO 4:
        Crea una lista (<ul>) con varios elementos (<li>) y un botón. Al pulsar el botón debe cambiar el color de los elementos con índice par a azul y los elementos con índice impar a rojo.
    -->

    <!-- EJERCICIO 5:
        Crea una lista (<ul>) con varios elementos (<li>).
        Cuando el usuario haga clic en un elemento de la lista, muestra en un alert su texto.
    -->

    <script src="ejercicios.script"></script>
